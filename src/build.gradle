plugins {
    id 'java'
    id 'com.diffplug.spotless' version '6.25.0'
}

allprojects {
    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'application'
    apply plugin: 'com.diffplug.spotless'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }

    // 各章のメインクラスを「フォルダ名」から自動的に決定する（個別の設定は不要）
    application {
        mainClass = "customdb.${project.name}.Main"
    }

    // コードフォーマッタ（Google Java Format）の設定
    spotless {
        java {
            googleJavaFormat()
        }
    }

    // テストライブラリの共通導入
    dependencies {
        testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    }

    tasks.named('test') {
        useJUnitPlatform()
    }

    tasks.withType(JavaExec).configureEach {
        standardInput = System.in
    }
}
